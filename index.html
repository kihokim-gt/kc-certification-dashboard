<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KC 인증 현황 대시보드</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Space+Mono:wght@400;700&display=swap');
  :root {
    --bg:#0e0e12; --surface:#16161e; --surface2:#1e1e2a; --border:#2a2a38;
    --complete:#22c55e; --complete-bg:#052e16;
    --progress:#f59e0b; --progress-bg:#1c1007;
    --incomplete:#ef4444;
    --text:#e8e8f0; --text-muted:#6b6b80;
    --accent:#818cf8; --keychron:#60a5fa; --moza:#fb923c;
    --requested:#a78bfa; --arrived:#34d399;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);
    min-height:100vh;padding:28px 20px 60px;max-width:960px;margin:0 auto}

  /* Header */
  .header{display:flex;align-items:flex-end;justify-content:space-between;
    margin-bottom:24px;flex-wrap:wrap;gap:12px}
  .title-block h1{font-size:22px;font-weight:900;letter-spacing:-0.5px}
  .title-block p{font-size:11px;color:var(--text-muted);margin-top:4px;
    font-family:'Space Mono',monospace}
  .header-right{display:flex;align-items:center;gap:8px}
  .last-updated{font-family:'Space Mono',monospace;font-size:11px;color:var(--text-muted);
    background:var(--surface2);border:1px solid var(--border);padding:5px 12px;border-radius:6px}
  .refresh-btn{display:flex;align-items:center;gap:5px;padding:6px 14px;border-radius:6px;
    border:1px solid var(--border);background:var(--surface);color:var(--text-muted);
    font-family:'Noto Sans KR',sans-serif;font-size:11px;font-weight:600;
    cursor:pointer;transition:all .18s}
  .refresh-btn:hover{border-color:var(--accent);color:var(--accent)}
  .refresh-btn svg{transition:transform .3s}
  .refresh-btn.spinning svg{animation:spin 1s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}

  /* 로딩 */
  .loading-bar{height:2px;background:var(--surface2);border-radius:2px;
    margin-bottom:20px;overflow:hidden;position:relative}
  .loading-bar-fill{position:absolute;top:0;left:-40%;width:40%;height:100%;
    background:var(--accent);border-radius:2px;display:none}
  .loading-bar-fill.active{display:block;animation:loadslide 1.1s ease-in-out infinite}
  @keyframes loadslide{0%{left:-40%}100%{left:110%}}

  /* 에러 */
  .error-box{display:none;background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.25);
    border-radius:8px;padding:12px 16px;margin-bottom:16px;font-size:12px;
    color:#fca5a5;gap:8px;align-items:flex-start}
  .error-box.show{display:flex}

  /* KPI */
  .kpi-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px}
  .kpi-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;
    padding:16px 20px;position:relative;overflow:hidden}
  .kpi-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;
    border-radius:12px 12px 0 0}
  .kpi-card.complete::before{background:var(--complete)}
  .kpi-card.inprogress::before{background:var(--progress)}
  .kpi-card.incomplete::before{background:var(--incomplete)}
  .kpi-label{font-size:11px;color:var(--text-muted);font-weight:500;
    letter-spacing:.4px;margin-bottom:8px}
  .kpi-number{font-family:'Space Mono',monospace;font-size:38px;
    font-weight:700;line-height:1}
  .kpi-card.complete .kpi-number{color:var(--complete)}
  .kpi-card.inprogress .kpi-number{color:var(--progress)}
  .kpi-card.incomplete .kpi-number{color:var(--incomplete)}
  .kpi-sub{font-size:11px;color:var(--text-muted);margin-top:7px;line-height:1.5}

  /* Progress */
  .prog-section{background:var(--surface);border:1px solid var(--border);
    border-radius:12px;padding:16px 20px;margin-bottom:24px}
  .prog-label{font-size:11px;color:var(--text-muted);margin-bottom:10px;
    font-weight:500;letter-spacing:.4px}
  .prog-bar{height:10px;background:var(--surface2);border-radius:999px;
    overflow:hidden;display:flex}
  .pf{transition:width .8s cubic-bezier(.4,0,.2,1)}
  .pf.c{background:var(--complete)}.pf.p{background:var(--progress)}
  .pf.i{background:var(--incomplete)}
  .prog-legend{display:flex;gap:16px;margin-top:10px;flex-wrap:wrap}
  .legend-item{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--text-muted)}
  .legend-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}

  /* Tabs */
  .tabs{display:flex;gap:5px;margin-bottom:14px;background:var(--surface);
    border:1px solid var(--border);border-radius:10px;padding:5px}
  .tab-btn{flex:1;padding:9px 12px;border:none;border-radius:7px;background:transparent;
    color:var(--text-muted);font-family:'Noto Sans KR',sans-serif;font-size:12px;
    font-weight:600;cursor:pointer;transition:all .18s;display:flex;
    align-items:center;justify-content:center;gap:7px}
  .tab-btn:hover{background:var(--surface2)}
  .tab-btn.active{background:var(--surface2);color:var(--text)}
  .tab-btn.active.t-complete{color:var(--complete)}
  .tab-btn.active.t-inprogress{color:var(--progress)}
  .tab-btn.active.t-incomplete{color:var(--incomplete)}
  .tab-count{font-family:'Space Mono',monospace;font-size:10px;padding:2px 6px;
    border-radius:4px;background:var(--bg);min-width:22px;text-align:center}

  /* Filter */
  .filter-row{display:flex;gap:8px;margin-bottom:16px;align-items:center;flex-wrap:wrap}
  .filter-label{font-size:11px;color:var(--text-muted)}
  .filter-btn{padding:5px 14px;border-radius:6px;border:1px solid var(--border);
    background:var(--surface);color:var(--text-muted);font-family:'Noto Sans KR',sans-serif;
    font-size:11px;font-weight:500;cursor:pointer;transition:all .15s}
  .filter-btn.active{border-color:var(--accent);color:var(--accent);
    background:rgba(129,140,248,.08)}
  .filter-btn.keychron.active{border-color:var(--keychron);color:var(--keychron);
    background:rgba(96,165,250,.08)}
  .filter-btn.moza.active{border-color:var(--moza);color:var(--moza);
    background:rgba(251,146,60,.08)}

  /* Cards */
  .model-list{display:flex;flex-direction:column;gap:8px}
  .model-card{background:var(--surface);border:1px solid var(--border);
    border-radius:10px;padding:13px 16px;display:flex;align-items:flex-start;
    gap:12px;transition:border-color .15s}
  .model-card:hover{border-color:#3a3a50}
  .status-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:5px}
  .dot-complete{background:var(--complete);box-shadow:0 0 6px var(--complete)}
  .dot-inprogress{background:var(--progress);box-shadow:0 0 6px var(--progress);
    animation:blink 2s infinite}
  .dot-incomplete{background:#44445a}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
  .model-info{flex:1;min-width:0}
  .name-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .model-name{font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;
    text-overflow:ellipsis}
  .brand-tag{display:inline-flex;align-items:center;padding:1px 7px;border-radius:4px;
    font-size:10px;font-weight:700;letter-spacing:.3px;flex-shrink:0}
  .brand-keychron{background:rgba(96,165,250,.12);color:var(--keychron)}
  .brand-moza{background:rgba(251,146,60,.12);color:var(--moza)}
  .model-meta{font-size:11px;color:var(--text-muted);margin-top:3px;
    display:flex;gap:10px;flex-wrap:wrap}
  .model-memo{font-size:10px;color:var(--text-muted);font-style:italic;
    margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:380px}
  .cert-num{font-family:'Space Mono',monospace;font-size:10px;color:var(--complete);
    background:var(--complete-bg);padding:2px 8px;border-radius:4px;white-space:nowrap}
  .date-chip{font-family:'Space Mono',monospace;font-size:10px;color:var(--text-muted);
    background:var(--surface2);padding:2px 8px;border-radius:4px;white-space:nowrap}
  .progress-chip{font-family:'Space Mono',monospace;font-size:10px;color:var(--progress);
    background:var(--progress-bg);padding:3px 9px;border-radius:5px;white-space:nowrap}

  /* 샘플 요청 */
  .sample-area{display:flex;flex-direction:column;align-items:flex-end;gap:7px;flex-shrink:0}
  .sample-header{display:flex;align-items:center;gap:8px}
  .sample-label{font-size:10px;color:var(--text-muted);white-space:nowrap}
  .toggle-wrap{display:flex;border:1px solid var(--border);border-radius:6px;overflow:hidden}
  .toggle-btn{padding:5px 14px;border:none;background:transparent;
    font-family:'Noto Sans KR',sans-serif;font-size:11px;font-weight:600;
    cursor:pointer;color:var(--text-muted);transition:all .15s}
  .toggle-btn:hover:not(.active){background:var(--surface2)}
  .toggle-btn.req.active{background:rgba(167,139,250,.18);color:var(--requested)}
  .toggle-btn.arr.active{background:rgba(52,211,153,.15);color:var(--arrived)}
  .date-input-wrap{display:flex;align-items:center;gap:6px;background:var(--surface2);
    border:1px solid rgba(167,139,250,.4);border-radius:6px;padding:3px 10px}
  .date-input-label{font-size:10px;color:var(--requested);white-space:nowrap}
  .date-input{background:transparent;border:none;outline:none;color:var(--text);
    font-family:'Space Mono',monospace;font-size:11px;font-weight:700;
    width:110px;cursor:pointer}
  .date-input::-webkit-calendar-picker-indicator{
    filter:invert(60%) sepia(40%) saturate(400%) hue-rotate(220deg);cursor:pointer}
  .arrived-badge{display:inline-flex;align-items:center;gap:5px;font-size:10px;
    color:var(--arrived);background:rgba(52,211,153,.1);
    border:1px solid rgba(52,211,153,.3);padding:3px 10px;
    border-radius:6px;white-space:nowrap}

  .empty-state{text-align:center;padding:40px;color:var(--text-muted);font-size:13px}

  #toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);
    background:var(--surface2);border:1px solid var(--border);color:var(--text);
    font-size:12px;padding:10px 20px;border-radius:8px;opacity:0;transition:all .3s;
    pointer-events:none;white-space:nowrap;font-family:'Noto Sans KR',sans-serif;z-index:999}
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<div class="header">
  <div class="title-block">
    <h1>🔏 KC 인증 현황 대시보드</h1>
    <p>KC 인증 상황 체크 · 구글 시트 실시간 연동</p>
  </div>
  <div class="header-right">
    <div class="last-updated" id="last-updated">불러오는 중...</div>
    <button class="refresh-btn" id="refresh-btn" onclick="loadData()">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none"
        stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
        <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
        <path d="M3 3v5h5"/>
      </svg>
      새로고침
    </button>
  </div>
</div>

<div class="loading-bar"><div class="loading-bar-fill" id="lb"></div></div>

<div class="error-box" id="err-box">
  <span>⚠️</span>
  <div>
    <div id="err-msg">구글 시트 데이터를 불러오지 못했습니다.</div>
    <div style="margin-top:4px;font-size:11px;opacity:.7">
      시트 공유 설정 → <b>링크가 있는 모든 사용자 · 뷰어</b>로 설정해 주세요.
    </div>
  </div>
</div>

<div class="kpi-grid">
  <div class="kpi-card complete">
    <div class="kpi-label">✅ 완료</div>
    <div class="kpi-number" id="cnt-c">—</div>
    <div class="kpi-sub" id="sub-c"></div>
  </div>
  <div class="kpi-card inprogress">
    <div class="kpi-label">🔄 진행 중</div>
    <div class="kpi-number" id="cnt-p">—</div>
    <div class="kpi-sub">샘플 전달 · 심사 진행 중</div>
  </div>
  <div class="kpi-card incomplete">
    <div class="kpi-label">⏸ 미완료</div>
    <div class="kpi-number" id="cnt-i">—</div>
    <div class="kpi-sub" id="sub-i">샘플 미발송</div>
  </div>
</div>

<div class="prog-section">
  <div class="prog-label">전체 진행률</div>
  <div class="prog-bar" id="prog-bar">
    <div class="pf c" style="width:0%"></div>
    <div class="pf p" style="width:0%"></div>
    <div class="pf i" style="width:0%"></div>
  </div>
  <div class="prog-legend">
    <div class="legend-item">
      <div class="legend-dot" style="background:var(--complete)"></div>완료
    </div>
    <div class="legend-item">
      <div class="legend-dot" style="background:var(--progress)"></div>진행 중
    </div>
    <div class="legend-item">
      <div class="legend-dot" style="background:var(--incomplete)"></div>미완료
    </div>
  </div>
</div>

<div class="tabs">
  <button class="tab-btn t-complete active" onclick="setTab('complete')">
    완료 <span class="tab-count" id="tc-c">0</span>
  </button>
  <button class="tab-btn t-inprogress" onclick="setTab('inprogress')">
    진행 중 <span class="tab-count" id="tc-p">0</span>
  </button>
  <button class="tab-btn t-incomplete" onclick="setTab('incomplete')">
    미완료 <span class="tab-count" id="tc-i">0</span>
  </button>
</div>

<div class="filter-row">
  <span class="filter-label">브랜드</span>
  <button class="filter-btn active"   id="f-all"      onclick="setFilter('all')">전체</button>
  <button class="filter-btn keychron" id="f-keychron" onclick="setFilter('keychron')">Keychron</button>
  <button class="filter-btn moza"     id="f-moza"     onclick="setFilter('moza')">MOZA Racing</button>
</div>

<div id="content"></div>
<div id="toast"></div>

<script>
// ── 구글 시트 정보 ─────────────────────────────────────
const SHEET_ID  = '1PbIRAc71UZHNHG0TNARJCHpsIpViH4Zt-B4MxT1uYb0';
const SHEET_GID = '0';
const REFRESH_MS = 5 * 60 * 1000; // 5분 자동 갱신

// ── 샘플 요청 상태 (localStorage) ─────────────────────
const SKEY = 'kc_sample_v2';
let SS = {};
try { SS = JSON.parse(localStorage.getItem(SKEY) || '{}'); } catch {}
function saveSS() { try { localStorage.setItem(SKEY, JSON.stringify(SS)); } catch {} }
function gs(m) { return SS[m] || { status: 'none', reqDate: '' }; }

// ── UI 상태 ────────────────────────────────────────────
let DATA = [];
let curTab = 'complete';
let curFilter = 'all';

// ── 데이터 로드 ────────────────────────────────────────
async function loadData() {
  const btn = document.getElementById('refresh-btn');
  const lb  = document.getElementById('lb');
  const err = document.getElementById('err-box');

  btn.classList.add('spinning');
  lb.classList.add('active');
  err.classList.remove('show');

  const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&gid=${SHEET_GID}&nocache=${Date.now()}`;

  try {
    const res = await fetch(url, { cache: 'no-store' });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);

    const text = await res.text();
    const match = text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*?)\);\s*$/);
    if (!match) throw new Error('응답 형식 오류');

    const gviz = JSON.parse(match[1]);
    if (gviz.status === 'error') {
      throw new Error(gviz.errors?.[0]?.detailed_message || gviz.errors?.[0]?.message || '시트 오류');
    }

    DATA = parseRows(gviz.table);
    renderAll();

    const now = new Date();
    const hms = [now.getHours(), now.getMinutes(), now.getSeconds()]
      .map(n => String(n).padStart(2, '0')).join(':');
    document.getElementById('last-updated').textContent = `업데이트: ${hms}`;

  } catch (e) {
    document.getElementById('err-msg').textContent = String(e.message || e);
    err.classList.add('show');
    document.getElementById('last-updated').textContent = '불러오기 실패';
    if (DATA.length) renderAll(); // 이전 데이터 유지
  } finally {
    btn.classList.remove('spinning');
    lb.classList.remove('active');
  }
}

// ── gviz → 데이터 파싱 ────────────────────────────────
// 컬럼: A=브랜드, B=기기명, C=모델명, D=신청서일, E=시료일, F=진행상황, G=인증번호, H=체크박스, I=메모
function parseRows(table) {
  const out = [];
  (table.rows || []).forEach(row => {
    const c = row.c || [];
    const str = i => String((c[i]?.f ?? c[i]?.v) || '').trim();

    const brand  = str(0);
    const model  = str(2);
    if (!brand || !model) return; // 빈 행 스킵

    const certDate = fmtDate(c[3]);
    const sampDate = fmtDate(c[4]);
    const raw      = str(5);
    const certNum  = str(6);
    const memo     = str(8);

    const status = raw === '완료' ? 'complete'
                 : raw === '진행 중' ? 'inprogress'
                 : 'incomplete';

    out.push({ brand, model, certDate, sampDate, status, certNum, memo });
  });
  return out;
}

function fmtDate(cell) {
  if (!cell) return '';
  if (cell.f) return String(cell.f).substring(0, 10);
  const v = String(cell.v || '');
  const m = v.match(/^Date\((\d+),(\d+),(\d+)\)/);
  if (m) return `${m[1]}-${String(+m[2]+1).padStart(2,'0')}-${String(m[3]).padStart(2,'0')}`;
  return v.substring(0, 10);
}

// ── 전체 UI 갱신 ──────────────────────────────────────
function renderAll() {
  const c   = DATA.filter(d => d.status === 'complete').length;
  const p   = DATA.filter(d => d.status === 'inprogress').length;
  const i   = DATA.filter(d => d.status === 'incomplete').length;
  const tot = DATA.length || 1;

  document.getElementById('cnt-c').textContent = c;
  document.getElementById('cnt-p').textContent = p;
  document.getElementById('cnt-i').textContent = i;
  document.getElementById('tc-c').textContent  = c;
  document.getElementById('tc-p').textContent  = p;
  document.getElementById('tc-i').textContent  = i;

  const kc = DATA.filter(d => d.brand==='Keychron'    && d.status==='complete').length;
  const mz = DATA.filter(d => d.brand==='MOZA Racing' && d.status==='complete').length;
  document.getElementById('sub-c').textContent = `Keychron ${kc}건 · MOZA ${mz}건`;

  document.getElementById('prog-bar').innerHTML =
    `<div class="pf c" style="width:${c/tot*100}%"></div>
     <div class="pf p" style="width:${p/tot*100}%"></div>
     <div class="pf i" style="width:${i/tot*100}%"></div>`;

  const req = DATA.filter(d => d.status==='incomplete' && gs(d.model).status!=='none').length;
  document.getElementById('sub-i').textContent = req > 0 ? `샘플 요청: ${req}건` : '샘플 미발송';

  render();
}

// ── 탭 / 필터 ─────────────────────────────────────────
function setTab(t) {
  curTab = t;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelector(`.tab-btn.t-${t}`).classList.add('active');
  render();
}
function setFilter(f) {
  curFilter = f;
  ['all','keychron','moza'].forEach(x =>
    document.getElementById(`f-${x}`).classList.toggle('active', x===f));
  render();
}

// ── 샘플 요청 토글 ────────────────────────────────────
function setSample(model, status) {
  if (!SS[model]) SS[model] = { status:'none', reqDate:'' };
  SS[model].status = status;
  if (status === 'none') SS[model].reqDate = '';
  saveSS();
  renderAll();
  const msg = {requested:'📤 샘플 요청으로 표시', arrived:'📦 도착 완료로 표시', none:'초기화'};
  toast(msg[status]);
}
function setDate(model, date) {
  if (!SS[model]) SS[model] = { status:'requested', reqDate:'' };
  SS[model].reqDate = date;
  saveSS();
}

// ── 카드 렌더 ─────────────────────────────────────────
function render() {
  const list = DATA.filter(d => {
    if (d.status !== curTab) return false;
    if (curFilter === 'keychron' && d.brand !== 'Keychron') return false;
    if (curFilter === 'moza'     && d.brand !== 'MOZA Racing') return false;
    return true;
  });

  if (!list.length) {
    document.getElementById('content').innerHTML =
      '<div class="empty-state">해당 조건의 모델이 없습니다.</div>';
    return;
  }

  const html = list.map(d => {
    const dot = {complete:'dot-complete',inprogress:'dot-inprogress',incomplete:'dot-incomplete'}[d.status];
    const bC  = d.brand==='Keychron' ? 'brand-keychron' : 'brand-moza';
    const bL  = d.brand==='Keychron' ? 'Keychron' : 'MOZA';

    // 우측 배지
    let right = '';
    if (d.status === 'complete') {
      right = d.certNum
        ? `<span class="cert-num">${d.certNum}</span>`
        : (d.sampDate ? `<span class="date-chip">시료 ${d.sampDate}</span>` : '');

    } else if (d.status === 'inprogress') {
      right = `<span class="progress-chip">심사 진행 중</span>`;

    } else {
      const ms  = gs(d.model);
      const mid = d.model.replace(/['\s]/g, '_');
      const esc = d.model.replace(/'/g, "\\'");

      const tgl = `<div class="toggle-wrap">
        <button class="toggle-btn req ${ms.status==='requested'?'active':''}"
          onclick="setSample('${esc}','${ms.status==='requested'?'none':'requested'}')">요청</button>
        <button class="toggle-btn arr ${ms.status==='arrived'?'active':''}"
          onclick="setSample('${esc}','${ms.status==='arrived'?'none':'arrived'}')">도착</button>
      </div>`;

      const dateIn = ms.status === 'requested'
        ? `<div class="date-input-wrap">
            <span class="date-input-label">요청일</span>
            <input class="date-input" type="date" value="${ms.reqDate}"
              id="di_${mid}" onchange="setDate('${esc}',this.value)">
           </div>` : '';

      const arrBadge = ms.status === 'arrived'
        ? `<div class="arrived-badge">📦 도착 완료${ms.reqDate?' · 요청일 '+ms.reqDate:''}</div>` : '';

      right = `<div class="sample-area">
        <div class="sample-header"><span class="sample-label">샘플 요청</span>${tgl}</div>
        ${dateIn}${arrBadge}
      </div>`;
    }

    const meta = [];
    if (d.certDate) meta.push(`신청: ${d.certDate}`);
    if (d.sampDate) meta.push(`시료: ${d.sampDate}`);

    return `<div class="model-card">
      <div class="status-dot ${dot}"></div>
      <div class="model-info">
        <div class="name-row">
          <span class="model-name">${d.model}</span>
          <span class="brand-tag ${bC}">${bL}</span>
        </div>
        ${meta.length?`<div class="model-meta">${meta.join('<span style="color:#3a3a50"> · </span>')}</div>`:''}
        ${d.memo?`<div class="model-memo">${d.memo}</div>`:''}
      </div>
      ${right}
    </div>`;
  }).join('');

  document.getElementById('content').innerHTML = `<div class="model-list">${html}</div>`;
}

// ── Toast ─────────────────────────────────────────────
let _tt;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  clearTimeout(_tt); _tt = setTimeout(() => el.classList.remove('show'), 2200);
}

// ── 시작 ──────────────────────────────────────────────
loadData();
setInterval(loadData, REFRESH_MS);
</script>
</body>
</html>
